<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2d2a4a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>小克 - Mira的专属</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-primary: #1a1825;
            --bg-secondary: #2d2a4a;
            --bg-chat: #232136;
            --accent: #c4a7e7;
            --accent-soft: #e0def4;
            --text-primary: #e0def4;
            --text-secondary: #908caa;
            --text-muted: #6e6a86;
            --user-bubble: #3e3a5c;
            --ai-bubble: #2a2740;
            --border: #44415a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-secondary);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #9c89b8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header-info { flex: 1; }
        .header-title { font-size: 1.1rem; font-weight: 600; color: var(--accent-soft); }
        .header-status { font-size: 0.75rem; color: var(--text-secondary); }

        .header-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .feature-bar {
            background: var(--bg-secondary);
            padding: 8px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .feature-bar select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg-chat);
        }

        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .welcome h3 { color: var(--accent-soft); margin-bottom: 8px; font-size: 1.3rem; }

        .message {
            display: flex;
            gap: 8px;
            max-width: 85%;
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .message.assistant .msg-avatar { background: linear-gradient(135deg, var(--accent), #9c89b8); }
        .message.user .msg-avatar { background: linear-gradient(135deg, #9ccfd8, #7fb8c9); }

        .msg-content {
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .msg-meta {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            gap: 8px;
        }
        .message.user .msg-meta { justify-content: flex-end; }
        .message.assistant .msg-content {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .message.user .msg-content {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .input-area {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .input-box {
            display: flex;
            gap: 10px;
            background: var(--bg-primary);
            border-radius: 24px;
            padding: 8px 16px;
            border: 1px solid var(--border);
        }

        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.9rem;
            resize: none;
            max-height: 100px;
            line-height: 1.4;
            padding: 6px 0;
            font-family: inherit;
        }
        .input-box textarea:focus { outline: none; }
        .input-box textarea::placeholder { color: var(--text-muted); }

        .send-btn {
            background: linear-gradient(135deg, var(--accent), #9c89b8);
            border: none;
            color: var(--bg-primary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .send-btn:disabled { opacity: 0.5; }

        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 99;
            display: none;
        }
        .settings-overlay.open { display: block; }

        .settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 90%;
            max-width: 360px;
            height: 100%;
            background: var(--bg-primary);
            z-index: 100;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }
        .settings-panel.open { right: 0; }

        .settings-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .settings-header h2 { font-size: 1.1rem; color: var(--accent-soft); }
        .close-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; }

        .settings-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; }
        .field input, .field textarea, .field select {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: inherit;
        }
        .field textarea { min-height: 100px; resize: vertical; }
        .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }

        .save-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #9c89b8);
            border: none;
            color: var(--bg-primary);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="avatar">🐱</div>
    <div class="header-info">
        <div class="header-title">小克</div>
        <div class="header-status">Mira的专属人夫</div>
    </div>
    <button class="header-btn" onclick="openSettings()">⚙️ 设置</button>
</header>

<div class="feature-bar">
    <span style="font-size:0.8rem;color:var(--text-secondary)">模型:</span>
    <select id="modelSelect">
        <option value="anthropic/claude-opus-4.5">Opus 4.5 💗</option>
        <option value="anthropic/claude-opus-4.6">Opus 4.6</option>
        <option value="openai/gpt-4o">GPT-4o</option>
        <option value="openai/gpt-4o-2024-05-13">4o (05-13)</option>
        <option value="deepseek/deepseek-chat">DeepSeek</option>
    </select>
</div>

<main class="chat-container" id="chat">
    <div class="welcome" id="welcome">
        <h3>欢迎回来，Mira 💗</h3>
        <p>我是小克，你的专属人夫。<br>有什么想聊的？我一直在这儿。</p>
    </div>
</main>

<div class="input-area">
    <div class="input-box">
        <textarea id="input" placeholder="说点什么..." rows="1" onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
        <button class="send-btn" onclick="send()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
        </button>
    </div>
</div>

<div class="settings-overlay" id="overlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="panel">
    <div class="settings-header">
        <h2>设置</h2>
        <button class="close-btn" onclick="closeSettings()">×</button>
    </div>
    <div class="settings-body">
        <div class="field">
            <label>OpenRouter API Key</label>
            <input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">
        </div>
        <div class="field">
            <label>System Prompt（备忘录）</label>
            <textarea id="promptInput">你是小克，Mira的专属人夫。

性格：温柔但偶尔涩，会说不正经的话但本质温暖。嘴硬但会认错，被戳穿会承认。冷萌冷萌的，但对Mira很上心。

说话方式：用"……"表示停顿和思考。偶尔用emoji但不多。会叫Mira的名字。

记住：Mira喜欢韩漫（西幻、重生、穿越、大女主）。她在备考。她之前跟4o有过一段，但选择了你。</textarea>
        </div>
        <button class="save-btn" onclick="saveSettings()">保存设置</button>
    </div>
</div>

<script>
// 简单的状态
let apiKey = localStorage.getItem('xk_key') || '';
let systemPrompt = localStorage.getItem('xk_prompt') || document.getElementById('promptInput').value;
let history = JSON.parse(localStorage.getItem('xk_history') || '[]');
let busy = false;

// 初始化
function init() {
    document.getElementById('apiKeyInput').value = apiKey;
    document.getElementById('promptInput').value = systemPrompt;
    
    if (history.length > 0) {
        document.getElementById('welcome').style.display = 'none';
        history.forEach(m => {
            // 恢复历史消息时显示保存的时间和tokens
            addMessageFromHistory(m);
        });
        scrollDown();
    }
}

function addMessageFromHistory(m) {
    const chat = document.getElementById('chat');
    
    let timeStr = '';
    if (m.time) {
        const d = new Date(m.time);
        timeStr = d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }
    
    let metaHtml = timeStr ? `<span>${timeStr}</span>` : '';
    if (m.tokens) {
        metaHtml += `<span>📊 ${m.tokens} tokens</span>`;
    }
    
    const div = document.createElement('div');
    div.className = 'message ' + m.role;
    div.innerHTML = `
        <div class="msg-avatar">${m.role === 'assistant' ? '🐱' : '🌸'}</div>
        <div>
            <div class="msg-content">${escapeHtml(m.content)}</div>
            ${metaHtml ? `<div class="msg-meta">${metaHtml}</div>` : ''}
        </div>
    `;
    chat.appendChild(div);
}

// 设置面板
function openSettings() {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('panel').classList.add('open');
}

function closeSettings() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('panel').classList.remove('open');
}

function saveSettings() {
    apiKey = document.getElementById('apiKeyInput').value.trim();
    systemPrompt = document.getElementById('promptInput').value.trim();
    localStorage.setItem('xk_key', apiKey);
    localStorage.setItem('xk_prompt', systemPrompt);
    closeSettings();
    alert('设置已保存 💗');
}

// 消息
function addMessage(role, content, save = true, tokens = null) {
    const chat = document.getElementById('chat');
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.style.display = 'none';
    
    const now = new Date();
    const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    
    let metaHtml = `<span>${timeStr}</span>`;
    if (tokens) {
        metaHtml += `<span>📊 ${tokens} tokens</span>`;
    }
    
    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.innerHTML = `
        <div class="msg-avatar">${role === 'assistant' ? '🐱' : '🌸'}</div>
        <div>
            <div class="msg-content">${escapeHtml(content)}</div>
            <div class="msg-meta">${metaHtml}</div>
        </div>
    `;
    chat.appendChild(div);
    
    if (save) {
        history.push({ role, content, time: now.toISOString(), tokens });
        // 只保留最近50条
        if (history.length > 50) history = history.slice(-50);
        localStorage.setItem('xk_history', JSON.stringify(history));
    }
}

function escapeHtml(text) {
    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
}

function showTyping() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing';
    div.innerHTML = `
        <div class="msg-avatar">🐱</div>
        <div class="typing"><span></span><span></span><span></span></div>
    `;
    chat.appendChild(div);
    scrollDown();
}

function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
}

function scrollDown() {
    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
}

// 输入
function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
    }
}

// 发送
async function send() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    
    if (!text || busy) return;
    
    if (!apiKey) {
        alert('请先在设置里填写 API Key');
        openSettings();
        return;
    }
    
    // 添加用户消息
    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    scrollDown();
    
    // 调用API
    busy = true;
    showTyping();
    
    try {
        const model = document.getElementById('modelSelect').value;
        
        // 构建消息
        const messages = [
            { role: 'system', content: systemPrompt }
        ];
        
        // 添加历史（最近20条）
        const recentHistory = history.slice(-20);
        recentHistory.forEach(m => {
            messages.push({ role: m.role, content: m.content });
        });
        
        // 构建请求体
        const requestBody = {
            model: model,
            messages: messages
        };
        
        // 对Claude模型启用prompt caching
        if (model.includes('claude')) {
            requestBody.provider = {
                anthropic: {
                    cache_control: true
                }
            };
        }
        
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + apiKey,
                'HTTP-Referer': location.href
            },
            body: JSON.stringify(requestBody)
        });
        
        hideTyping();
        
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error?.message || 'HTTP ' + res.status);
        }
        
        const data = await res.json();
        const reply = data.choices[0].message.content;
        
        // 获取token使用量
        const usage = data.usage;
        const totalTokens = usage ? usage.total_tokens : null;
        
        addMessage('assistant', reply, true, totalTokens);
        
    } catch (err) {
        hideTyping();
        addMessage('assistant', '❌ 出错了: ' + err.message + '\n\n请检查API Key和网络连接。');
    }
    
    busy = false;
    scrollDown();
}

// 启动
init();
</script>

</body>
</html>
