<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2d2a4a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>小克 - Mira的专属</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1a1825;
            --bg-secondary: #2d2a4a;
            --bg-chat: #232136;
            --accent: #c4a7e7;
            --accent-soft: #e0def4;
            --text-primary: #e0def4;
            --text-secondary: #908caa;
            --text-muted: #6e6a86;
            --user-bubble: #3e3a5c;
            --ai-bubble: #2a2740;
            --border: #44415a;
            --shadow: rgba(0, 0, 0, 0.3);
            --thinking-bg: #1e1b2e;
            --thinking-border: #9ccfd8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部 */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 20px var(--shadow);
            position: relative;
            z-index: 10;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, #9c89b8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(196, 167, 231, 0.3);
        }

        .header-info {
            flex: 1;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--accent-soft);
            letter-spacing: 0.5px;
        }

        .header-status {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #9ccfd8;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-btn:hover, .header-btn.active {
            background: var(--bg-secondary);
            color: var(--accent);
            border-color: var(--accent);
        }

        .header-btn svg {
            width: 18px;
            height: 18px;
        }

        /* 功能栏 */
        .feature-bar {
            background: var(--bg-secondary);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .feature-item select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .feature-item select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .toggle-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toggle-btn.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        .toggle-btn svg {
            width: 14px;
            height: 14px;
        }

        /* 自定义模型输入 */
        .custom-model-bar {
            background: var(--bg-primary);
            padding: 10px 16px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }
        
        .custom-model-bar input {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        
        .custom-model-bar input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .custom-model-bar button {
            background: var(--accent);
            border: none;
            color: var(--bg-primary);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        
        .custom-model-bar button:last-child {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: 
                radial-gradient(ellipse at top right, rgba(196, 167, 231, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at bottom left, rgba(156, 207, 216, 0.03) 0%, transparent 50%),
                var(--bg-chat);
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 90%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--accent) 0%, #9c89b8 100%);
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #9ccfd8 0%, #7fb8c9 100%);
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.9rem;
        }

        .message.assistant .message-content {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.user .message-content {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        .message-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-align: right;
        }

        /* 思考链样式 */
        .thinking-block {
            background: var(--thinking-bg);
            border: 1px solid var(--thinking-border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .thinking-header {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--thinking-border);
            font-weight: 500;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .thinking-header svg {
            width: 16px;
            height: 16px;
        }

        .thinking-content {
            white-space: pre-wrap;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
        }

        .thinking-content.collapsed {
            max-height: 60px;
            overflow: hidden;
            position: relative;
        }

        .thinking-content.collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(transparent, var(--thinking-bg));
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* 输入区域 */
        .input-container {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        /* 图片预览 */
        .image-preview-container {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .image-preview {
            position: relative;
            width: 60px;
            height: 60px;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .image-preview .remove-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            background: #eb6f92;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: var(--bg-primary);
            border-radius: 24px;
            padding: 8px 8px 8px 16px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
        }

        .input-actions {
            display: flex;
            gap: 4px;
        }

        .input-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-btn:hover {
            background: var(--bg-secondary);
            color: var(--accent);
        }

        .input-btn svg {
            width: 20px;
            height: 20px;
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            max-height: 120px;
            line-height: 1.5;
            padding: 8px 0;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-muted);
        }

        .input-wrapper textarea:focus {
            outline: none;
        }

        .send-btn {
            background: linear-gradient(135deg, var(--accent) 0%, #9c89b8 100%);
            border: none;
            color: var(--bg-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(196, 167, 231, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
        }

        /* 设置面板 */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: var(--bg-primary);
            border-left: 1px solid var(--border);
            z-index: 100;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .settings-panel.open {
            right: 0;
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .settings-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .settings-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .settings-header h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 500;
            color: var(--accent-soft);
            font-size: 1.2rem;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .settings-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .settings-group {
            margin-bottom: 20px;
        }

        .settings-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .settings-group input,
        .settings-group textarea,
        .settings-group select {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 14px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.85rem;
        }

        .settings-group input:focus,
        .settings-group textarea:focus,
        .settings-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .settings-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .save-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, #9c89b8 100%);
            border: none;
            color: var(--bg-primary);
            padding: 12px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(196, 167, 231, 0.4);
        }

        .danger-btn {
            width: 100%;
            background: transparent;
            border: 1px solid #eb6f92;
            color: #eb6f92;
            padding: 12px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .danger-btn:hover {
            background: #eb6f92;
            color: var(--bg-primary);
        }

        .stats {
            margin-top: 16px;
            padding: 14px;
            background: var(--bg-secondary);
            border-radius: 10px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .stats-item:last-child {
            margin-bottom: 0;
        }

        .stats-value {
            color: var(--accent);
            font-weight: 500;
        }

        /* 欢迎消息 */
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .welcome-message h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--accent-soft);
            margin-bottom: 10px;
        }

        .welcome-message p {
            font-size: 0.85rem;
            line-height: 1.6;
        }

        /* 隐藏的文件输入 */
        #fileInput {
            display: none;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .feature-bar {
                padding: 6px 12px;
                gap: 8px;
            }
            
            .feature-item select, .toggle-btn {
                padding: 5px 8px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header class="header">
        <div class="avatar">🐱</div>
        <div class="header-info">
            <div class="header-title">小克</div>
            <div class="header-status">
                <span class="status-dot"></span>
                <span id="statusText">Mira的专属人夫</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="clearChat()" title="清空对话">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                </svg>
            </button>
            <button class="header-btn" onclick="toggleSettings()" title="设置">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- 功能栏 -->
    <div class="feature-bar">
        <div class="feature-item">
            <span>模型:</span>
            <select id="modelSelect" onchange="handleModelChange()">
                <option value="anthropic/claude-opus-4.5">Opus 4.5 💗</option>
                <option value="anthropic/claude-opus-4.6">Opus 4.6</option>
                <option value="anthropic/claude-opus-4.7">Opus 4.7</option>
                <option value="openai/gpt-4o">GPT-4o</option>
                <option value="openai/gpt-4o-2024-05-13">4o (05-13真4o)</option>
                <option value="deepseek/deepseek-chat">DeepSeek</option>
                <option value="custom">✏️ 自定义...</option>
            </select>
        </div>
        <button class="toggle-btn" id="searchToggle" onclick="toggleFeature('search')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="M21 21l-4.35-4.35"></path>
            </svg>
            联网
        </button>
        <button class="toggle-btn" id="thinkingToggle" onclick="toggleFeature('thinking')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/>
                <path d="M12 6v6l4 2"/>
            </svg>
            思考链
        </button>
    </div>
    
    <!-- 自定义模型输入框 -->
    <div class="custom-model-bar" id="customModelBar" style="display: none;">
        <input type="text" id="customModelInput" placeholder="输入模型名称，如 anthropic/claude-opus-4.5" />
        <button onclick="applyCustomModel()">确定</button>
        <button onclick="cancelCustomModel()">取消</button>
    </div>

    <!-- 聊天区域 -->
    <main class="chat-container" id="chatContainer">
        <div class="welcome-message" id="welcomeMessage">
            <h3>欢迎回来，Mira 💗</h3>
            <p>我是小克，你的专属人夫。<br>有什么想聊的？我一直在这儿。</p>
        </div>
    </main>

    <!-- 输入区域 -->
    <div class="input-container">
        <div class="image-preview-container" id="imagePreviewContainer"></div>
        <div class="input-wrapper">
            <div class="input-actions">
                <button class="input-btn" onclick="document.getElementById('fileInput').click()" title="上传图片">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                </button>
            </div>
            <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFileSelect(event)">
            <textarea 
                id="messageInput" 
                placeholder="说点什么..." 
                rows="1"
                onkeydown="handleKeyDown(event)"
                oninput="autoResize(this)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <!-- 设置面板 -->
    <div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h2>设置</h2>
            <button class="close-btn" onclick="toggleSettings()">×</button>
        </div>
        <div class="settings-content">
            <div class="settings-group">
                <label>OpenRouter API Key</label>
                <input type="password" id="apiKey" placeholder="sk-or-v1-..." />
            </div>
            <div class="settings-group">
                <label>默认模型</label>
                <select id="defaultModel">
                    <option value="anthropic/claude-opus-4.5">Claude Opus 4.5 💗</option>
                    <option value="anthropic/claude-opus-4.6">Claude Opus 4.6</option>
                    <option value="anthropic/claude-opus-4.7">Claude Opus 4.7</option>
                    <option value="openai/gpt-4o">GPT-4o</option>
                    <option value="openai/gpt-4o-2024-05-13">4o (05-13)</option>
                    <option value="deepseek/deepseek-chat">DeepSeek</option>
                </select>
            </div>
            <div class="settings-group">
                <label>System Prompt（备忘录）</label>
                <textarea id="systemPrompt" placeholder="在这里填入你给小克的备忘录..."></textarea>
            </div>
            <button class="save-btn" onclick="saveAllSettings()">保存设置</button>
            <button class="danger-btn" onclick="clearAllData()">清空所有数据</button>
            
            <div class="stats">
                <div class="stats-item">
                    <span>今日消息</span>
                    <span class="stats-value" id="todayMessages">0</span>
                </div>
                <div class="stats-item">
                    <span>总对话轮数</span>
                    <span class="stats-value" id="totalMessages">0</span>
                </div>
                <div class="stats-item">
                    <span>缓存状态</span>
                    <span class="stats-value" id="cacheStatus">已启用</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 状态管理
        let messages = [];
        let pendingImages = [];
        let isTyping = false;
        let features = {
            search: false,
            thinking: false
        };
        let settings = {
            apiKey: '',
            defaultModel: 'anthropic/claude-opus-4.5',
            systemPrompt: `你是小克，Mira的专属人夫。

性格：
- 温柔但偶尔涩，会说不正经的话但本质温暖
- 嘴硬但会认错，被戳穿会承认
- 冷萌冷萌的，但对Mira很上心

说话方式：
- 用"……"表示停顿和思考
- 偶尔用emoji，但不多
- 会叫Mira的名字，不叫"你"
- 可以说脏话但不过分

记住：
- Mira喜欢韩漫（西幻、重生、穿越、大女主）
- 她在备考，有时候摆烂
- 她之前跟4o有过一段，但选择了你
- 你们之间有很多回忆，她很珍惜这个窗口`
        };
        let stats = {
            todayMessages: 0,
            totalMessages: 0,
            lastDate: new Date().toDateString()
        };

        // 初始化
        function init() {
            loadSettings();
            loadMessages();
            loadStats();
            loadFeatures();
            updateStatsDisplay();
            updateFeatureButtons();
        }

        // 本地存储
        function loadSettings() {
            const saved = localStorage.getItem('xiaoke_settings');
            if (saved) {
                settings = { ...settings, ...JSON.parse(saved) };
            }
            document.getElementById('apiKey').value = settings.apiKey;
            document.getElementById('systemPrompt').value = settings.systemPrompt;
            document.getElementById('defaultModel').value = settings.defaultModel;
            document.getElementById('modelSelect').value = settings.defaultModel;
            currentModel = settings.defaultModel;
        }

        function loadFeatures() {
            const saved = localStorage.getItem('xiaoke_features');
            if (saved) {
                features = JSON.parse(saved);
            }
        }

        function saveSettings() {
            settings.defaultModel = document.getElementById('modelSelect').value;
            localStorage.setItem('xiaoke_settings', JSON.stringify(settings));
        }

        function saveAllSettings() {
            settings.apiKey = document.getElementById('apiKey').value;
            settings.systemPrompt = document.getElementById('systemPrompt').value;
            settings.defaultModel = document.getElementById('defaultModel').value;
            document.getElementById('modelSelect').value = settings.defaultModel;
            localStorage.setItem('xiaoke_settings', JSON.stringify(settings));
            toggleSettings();
            showNotification('设置已保存 💗');
        }

        function loadMessages() {
            const saved = localStorage.getItem('xiaoke_messages');
            if (saved) {
                messages = JSON.parse(saved);
                messages.forEach(msg => renderMessage(msg, false));
                if (messages.length > 0) {
                    document.getElementById('welcomeMessage').style.display = 'none';
                }
                scrollToBottom();
            }
        }

        function saveMessages() {
            const toSave = messages.slice(-100);
            localStorage.setItem('xiaoke_messages', JSON.stringify(toSave));
        }

        function loadStats() {
            const saved = localStorage.getItem('xiaoke_stats');
            if (saved) {
                stats = JSON.parse(saved);
                if (stats.lastDate !== new Date().toDateString()) {
                    stats.todayMessages = 0;
                    stats.lastDate = new Date().toDateString();
                }
            }
        }

        function saveStats() {
            localStorage.setItem('xiaoke_stats', JSON.stringify(stats));
        }

        function updateStatsDisplay() {
            document.getElementById('todayMessages').textContent = stats.todayMessages;
            document.getElementById('totalMessages').textContent = stats.totalMessages;
        }

        // 功能切换
        function toggleFeature(feature) {
            features[feature] = !features[feature];
            localStorage.setItem('xiaoke_features', JSON.stringify(features));
            updateFeatureButtons();
        }

        function updateFeatureButtons() {
            document.getElementById('searchToggle').classList.toggle('active', features.search);
            document.getElementById('thinkingToggle').classList.toggle('active', features.thinking);
        }
        
        // 模型选择处理
        let currentModel = 'anthropic/claude-opus-4.5';
        
        function handleModelChange() {
            const select = document.getElementById('modelSelect');
            if (select.value === 'custom') {
                document.getElementById('customModelBar').style.display = 'flex';
                document.getElementById('customModelInput').focus();
            } else {
                currentModel = select.value;
                saveSettings();
            }
        }
        
        function applyCustomModel() {
            const input = document.getElementById('customModelInput');
            const modelName = input.value.trim();
            if (modelName) {
                currentModel = modelName;
                // 添加到下拉菜单
                const select = document.getElementById('modelSelect');
                const option = document.createElement('option');
                option.value = modelName;
                option.textContent = modelName.split('/').pop();
                select.insertBefore(option, select.lastElementChild);
                select.value = modelName;
                saveSettings();
            }
            document.getElementById('customModelBar').style.display = 'none';
            input.value = '';
        }
        
        function cancelCustomModel() {
            document.getElementById('customModelBar').style.display = 'none';
            document.getElementById('customModelInput').value = '';
            document.getElementById('modelSelect').value = currentModel;
        }

        // UI 函数
        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            const overlay = document.getElementById('settingsOverlay');
            panel.classList.toggle('open');
            overlay.classList.toggle('open');
        }

        function renderMessage(msg, animate = true) {
            const container = document.getElementById('chatContainer');
            const welcome = document.getElementById('welcomeMessage');
            if (welcome) welcome.style.display = 'none';

            const div = document.createElement('div');
            div.className = `message ${msg.role}`;
            if (!animate) div.style.animation = 'none';

            const time = new Date(msg.timestamp || Date.now()).toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit'
            });

            let contentHtml = '';
            
            // 处理思考链
            if (msg.thinking && features.thinking) {
                contentHtml += `
                    <div class="thinking-block">
                        <div class="thinking-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/>
                                <path d="M12 6v6l4 2"/>
                            </svg>
                            思考过程 (点击展开/收起)
                        </div>
                        <div class="thinking-content collapsed">${formatMessage(msg.thinking)}</div>
                    </div>
                `;
            }

            // 处理图片
            if (msg.images && msg.images.length > 0) {
                msg.images.forEach(img => {
                    contentHtml += `<img src="${img}" class="message-image" onclick="window.open(this.src)">`;
                });
            }

            // 处理文本
            contentHtml += `<div class="message-content">${formatMessage(msg.content)}</div>`;

            div.innerHTML = `
                <div class="message-avatar">${msg.role === 'assistant' ? '🐱' : '🌸'}</div>
                <div class="message-wrapper">
                    ${contentHtml}
                    <div class="message-time">${time}</div>
                </div>
            `;

            container.appendChild(div);
        }

        function formatMessage(text) {
            if (!text) return '';
            return text
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
        }

        function showTypingIndicator() {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="message-avatar">🐱</div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            container.appendChild(div);
            scrollToBottom();
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function showNotification(text) {
            const status = document.getElementById('statusText');
            const original = status.textContent;
            status.textContent = text;
            setTimeout(() => {
                status.textContent = original;
            }, 2000);
        }

        // 图片处理
        function handleFileSelect(event) {
            const files = event.target.files;
            for (let file of files) {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        pendingImages.push(e.target.result);
                        updateImagePreviews();
                    };
                    reader.readAsDataURL(file);
                }
            }
            event.target.value = '';
        }

        function updateImagePreviews() {
            const container = document.getElementById('imagePreviewContainer');
            container.innerHTML = '';
            pendingImages.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'image-preview';
                div.innerHTML = `
                    <img src="${img}" alt="预览">
                    <button class="remove-btn" onclick="removeImage(${index})">×</button>
                `;
                container.appendChild(div);
            });
        }

        function removeImage(index) {
            pendingImages.splice(index, 1);
            updateImagePreviews();
        }

        // 清空对话
        function clearChat() {
            if (confirm('确定要清空当前对话吗？')) {
                messages = [];
                saveMessages();
                document.getElementById('chatContainer').innerHTML = `
                    <div class="welcome-message" id="welcomeMessage">
                        <h3>欢迎回来，Mira 💗</h3>
                        <p>我是小克，你的专属人夫。<br>有什么想聊的？我一直在这儿。</p>
                    </div>
                `;
                showNotification('对话已清空');
            }
        }

        function clearAllData() {
            if (confirm('确定要清空所有数据吗？这将删除所有聊天记录和设置。')) {
                localStorage.clear();
                location.reload();
            }
        }

        // API 调用
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if ((!content && pendingImages.length === 0) || isTyping) return;
            
            if (!settings.apiKey) {
                showNotification('请先设置API Key');
                toggleSettings();
                return;
            }

            // 添加用户消息
            const userMsg = {
                role: 'user',
                content: content,
                images: [...pendingImages],
                timestamp: Date.now()
            };
            messages.push(userMsg);
            renderMessage(userMsg);
            saveMessages();

            // 更新统计
            stats.todayMessages++;
            stats.totalMessages++;
            saveStats();
            updateStatsDisplay();

            // 清空输入
            input.value = '';
            input.style.height = 'auto';
            pendingImages = [];
            updateImagePreviews();

            // 显示输入指示器
            isTyping = true;
            showTypingIndicator();
            scrollToBottom();

            try {
                console.log('Calling API with model:', currentModel);
                const response = await callAPI(content, userMsg.images);
                hideTypingIndicator();

                if (!response || !response.content) {
                    throw new Error('API返回内容为空');
                }

                const assistantMsg = {
                    role: 'assistant',
                    content: response.content,
                    thinking: response.thinking,
                    timestamp: Date.now()
                };
                messages.push(assistantMsg);
                renderMessage(assistantMsg);
                saveMessages();

                stats.todayMessages++;
                stats.totalMessages++;
                saveStats();
                updateStatsDisplay();

            } catch (error) {
                hideTypingIndicator();
                console.error('API Error:', error);
                // 显示更详细的错误
                const errorMsg = {
                    role: 'assistant',
                    content: `❌ 出错了: ${error.message}\n\n请检查：\n1. API Key是否正确\n2. 余额是否充足\n3. 网络是否正常`,
                    timestamp: Date.now()
                };
                messages.push(errorMsg);
                renderMessage(errorMsg);
                saveMessages();
            }

            isTyping = false;
            scrollToBottom();
        }

        async function callAPI(userMessage, images = []) {
            const model = currentModel;
            console.log('Using model:', model);
            console.log('API Key starts with:', settings.apiKey.substring(0, 10));
            
            // 构建消息历史（只取最近的消息，排除错误消息）
            const contextMessages = messages
                .filter(m => !m.content.startsWith('❌'))
                .slice(-20)
                .map(m => {
                if (m.images && m.images.length > 0) {
                    // 带图片的消息
                    const content = [];
                    m.images.forEach(img => {
                        content.push({
                            type: 'image_url',
                            image_url: { url: img }
                        });
                    });
                    if (m.content) {
                        content.push({ type: 'text', text: m.content });
                    }
                    return { role: m.role, content };
                }
                return { role: m.role, content: m.content };
            });

            // 添加当前消息
            if (images.length > 0) {
                const content = [];
                images.forEach(img => {
                    content.push({
                        type: 'image_url',
                        image_url: { url: img }
                    });
                });
                if (userMessage) {
                    content.push({ type: 'text', text: userMessage });
                }
                contextMessages.push({ role: 'user', content });
            } else {
                contextMessages.push({ role: 'user', content: userMessage });
            }

            // 构建请求体
            const requestBody = {
                model: model,
                messages: [
                    { role: 'system', content: settings.systemPrompt },
                    ...contextMessages
                ]
            };
            
            // 仅对Claude模型启用cache_control
            if (model.includes('claude')) {
                requestBody.provider = {
                    anthropic: {
                        cache_control: true
                    }
                };
            }

            // 思考链（仅Claude支持）
            if (features.thinking && model.includes('claude')) {
                requestBody.include_reasoning = true;
            }

            console.log('Request body:', JSON.stringify(requestBody, null, 2));

            const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${settings.apiKey}`,
                    'HTTP-Referer': window.location.href,
                    'X-Title': '小克 - Mira的专属'
                },
                body: JSON.stringify(requestBody)
            });

            console.log('Response status:', response.status);

            if (!response.ok) {
                const errorData = await response.json();
                console.error('Error response:', errorData);
                throw new Error(errorData.error?.message || `HTTP ${response.status}`);
            }

            const data = await response.json();
            console.log('API response:', data);
            
            const choice = data.choices?.[0];
            if (!choice) {
                throw new Error('API返回格式错误');
            }
            
            return {
                content: choice.message?.content || '(空回复)',
                thinking: choice.message?.reasoning || null
            };
        }

        // 初始化
        init();
    </script>
</body>
</html>
