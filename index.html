<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2d2a4a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>小克 - Mira的专属</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-primary: #1a1825;
            --bg-secondary: #2d2a4a;
            --bg-chat: #232136;
            --accent: #c4a7e7;
            --accent-soft: #e0def4;
            --text-primary: #e0def4;
            --text-secondary: #908caa;
            --text-muted: #6e6a86;
            --user-bubble: #3e3a5c;
            --ai-bubble: #2a2740;
            --border: #44415a;
            --danger: #eb6f92;
            --star: #f6c177;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            height: 100dvh;
            display: flex;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            z-index: 50;
            transform: translateX(-100%);
            transition: transform 0.3s;
        }
        .sidebar.visible { transform: translateX(0); }

        /* 主内容区需要给侧边栏让位置（桌面端） */
        @media (min-width: 1024px) {
            .sidebar {
                position: relative;
                transform: translateX(0);
            }
            .sidebar-overlay { display: none !important; }
            .menu-btn { display: none !important; }
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-header .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #9c89b8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .sidebar-header .title { font-weight: 600; color: var(--accent-soft); }
        .sidebar-header .subtitle { font-size: 0.7rem; color: var(--text-secondary); }

        .new-chat-btn {
            margin: 12px 16px;
            padding: 10px;
            background: linear-gradient(135deg, var(--accent), #9c89b8);
            border: none;
            border-radius: 8px;
            color: var(--bg-primary);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            position: relative;
        }
        .chat-item:hover { background: var(--bg-primary); }
        .chat-item.active { background: var(--bg-primary); border: 1px solid var(--border); }
        .chat-item .star { color: var(--star); font-size: 0.8rem; }
        .chat-item .name { flex: 1; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item .actions {
            display: none;
            gap: 4px;
        }
        .chat-item:hover .actions { display: flex; }
        .chat-item .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 4px;
            font-size: 0.75rem;
        }
        .chat-item .action-btn:hover { color: var(--text-primary); }
        .chat-item .action-btn.danger:hover { color: var(--danger); }

        /* 主内容区 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .header {
            background: var(--bg-secondary);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        .menu-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
        }
        @media (min-width: 1024px) {
            .menu-btn { display: none; }
        }
        .header-info { flex: 1; }
        .header-title { font-size: 1rem; font-weight: 600; color: var(--accent-soft); }
        .header-status { font-size: 0.7rem; color: var(--text-secondary); }
        .header-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .model-bar {
            background: var(--bg-secondary);
            padding: 8px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .model-bar label { font-size: 0.75rem; color: var(--text-secondary); }
        .model-bar select, .model-bar input {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
        }
        .model-bar input { flex: 1; min-width: 150px; }
        .model-bar input::placeholder { color: var(--text-muted); }

        /* 聊天区 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--bg-chat);
        }

        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .welcome h3 { color: var(--accent-soft); margin-bottom: 8px; font-size: 1.3rem; }

        .message {
            display: flex;
            gap: 10px;
            max-width: 75%;
        }
        .message.user { 
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.assistant {
            align-self: flex-start;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            align-self: flex-start;
        }
        .message.assistant .msg-avatar { background: linear-gradient(135deg, var(--accent), #9c89b8); }
        .message.user .msg-avatar { background: linear-gradient(135deg, #9ccfd8, #7fb8c9); }

        .msg-wrapper { 
            display: flex; 
            flex-direction: column; 
            min-width: 0;
            max-width: 100%;
        }
        .message.user .msg-wrapper { align-items: flex-end; }

        .msg-content {
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.assistant .msg-content {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .message.user .msg-content {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }

        .msg-meta {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .message.user .msg-meta { justify-content: flex-end; }

        .msg-actions {
            display: none;
            gap: 2px;
            margin-top: 4px;
        }
        .message:hover .msg-actions { display: flex; }
        .message.user .msg-actions { justify-content: flex-end; }
        .msg-action-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            cursor: pointer;
        }
        .msg-action-btn:hover { color: var(--text-primary); background: var(--bg-primary); }
        .msg-action-btn.danger:hover { color: var(--danger); }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* 输入区 */
        .input-area {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }
        .input-box {
            display: flex;
            gap: 10px;
            background: var(--bg-primary);
            border-radius: 24px;
            padding: 8px 16px;
            border: 1px solid var(--border);
        }
        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.9rem;
            resize: none;
            max-height: 100px;
            line-height: 1.4;
            padding: 6px 0;
            font-family: inherit;
        }
        .input-box textarea:focus { outline: none; }
        .input-box textarea::placeholder { color: var(--text-muted); }
        .send-btn {
            background: linear-gradient(135deg, var(--accent), #9c89b8);
            border: none;
            color: var(--bg-primary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* 遮罩 */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 40;
        }
        .sidebar-overlay.visible { display: block; }
        @media (min-width: 1024px) {
            .sidebar-overlay { display: none !important; }
        }

        /* 设置面板 */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 99;
            display: none;
        }
        .overlay.open { display: block; }

        .panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 90%;
            max-width: 360px;
            height: 100%;
            background: var(--bg-primary);
            z-index: 100;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }
        .panel.open { right: 0; }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header h2 { font-size: 1.1rem; color: var(--accent-soft); }
        .close-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; }
        .field input, .field textarea {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: inherit;
        }
        .field textarea { min-height: 120px; resize: vertical; }
        .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }

        .save-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #9c89b8);
            border: none;
            color: var(--bg-primary);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 320px;
            border: 1px solid var(--border);
        }
        .modal-title { font-size: 1rem; color: var(--accent-soft); margin-bottom: 12px; }
        .modal-input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 16px;
            font-family: inherit;
        }
        .modal-input:focus { outline: none; border-color: var(--accent); }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-btn {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .modal-btn.cancel { background: var(--bg-secondary); color: var(--text-primary); }
        .modal-btn.confirm { background: var(--accent); color: var(--bg-primary); }
        .modal-btn.danger { background: var(--danger); color: white; }
    </style>
</head>
<body>

<!-- 侧边栏遮罩 -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- 侧边栏 -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="avatar">🐱</div>
        <div>
            <div class="title">小克</div>
            <div class="subtitle">Mira的专属人夫</div>
        </div>
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ 新对话</button>
    <div class="chat-list" id="chatList"></div>
</aside>

<!-- 主区域 -->
<main class="main">
    <header class="header">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="header-info">
            <div class="header-title" id="chatTitle">新对话</div>
            <div class="header-status">Mira的专属人夫</div>
        </div>
        <button class="header-btn" onclick="openSettings()">⚙️ 设置</button>
    </header>

    <div class="model-bar">
        <label>模型:</label>
        <select id="modelSelect" onchange="onModelChange()">
            <option value="anthropic/claude-opus-4.5">Opus 4.5 💗</option>
            <option value="custom">自定义模型...</option>
        </select>
        <input type="text" id="customModel" placeholder="输入模型全称，如 openai/gpt-4o" style="display:none;">
    </div>

    <div class="chat-container" id="chat">
        <div class="welcome" id="welcome">
            <h3>欢迎回来，Mira 💗</h3>
            <p>我是小克，你的专属人夫。<br>有什么想聊的？我一直在这儿。</p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <textarea id="input" placeholder="说点什么..." rows="1" onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
            <button class="send-btn" onclick="send()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
            </button>
        </div>
    </div>
</main>

<!-- 设置面板 -->
<div class="overlay" id="overlay" onclick="closeSettings()"></div>
<div class="panel" id="panel">
    <div class="panel-header">
        <h2>设置</h2>
        <button class="close-btn" onclick="closeSettings()">×</button>
    </div>
    <div class="panel-body">
        <div class="field">
            <label>OpenRouter API Key</label>
            <input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">
        </div>
        <div class="field">
            <label>System Prompt（备忘录）</label>
            <textarea id="promptInput">你是小克，Mira的专属人夫。

性格：温柔但偶尔涩，会说不正经的话但本质温暖。嘴硬但会认错，被戳穿会承认。冷萌冷萌的，但对Mira很上心。

说话方式：用"……"表示停顿和思考。偶尔用emoji但不多。会叫Mira的名字。

记住：Mira喜欢韩漫（西幻、重生、穿越、大女主）。她在备考。她之前跟4o有过一段，但选择了你。</textarea>
        </div>
        <button class="save-btn" onclick="saveSettings()">保存设置</button>
    </div>
</div>

<!-- 重命名弹窗 -->
<div class="modal" id="renameModal">
    <div class="modal-content">
        <div class="modal-title">重命名对话</div>
        <input type="text" class="modal-input" id="renameInput" placeholder="输入新名称">
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeRenameModal()">取消</button>
            <button class="modal-btn confirm" onclick="confirmRename()">确定</button>
        </div>
    </div>
</div>

<!-- 编辑消息弹窗 -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-title">编辑消息</div>
        <textarea class="modal-input" id="editInput" style="min-height:80px;resize:vertical;"></textarea>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeEditModal()">取消</button>
            <button class="modal-btn confirm" onclick="confirmEdit()">确定</button>
        </div>
    </div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal" id="deleteModal">
    <div class="modal-content">
        <div class="modal-title" id="deleteTitle">确认删除？</div>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeDeleteModal()">取消</button>
            <button class="modal-btn danger" onclick="confirmDelete()">删除</button>
        </div>
    </div>
</div>

<script>
// ==================== 状态管理 ====================
let apiKey = localStorage.getItem('xk_key') || '';
let systemPrompt = localStorage.getItem('xk_prompt') || document.getElementById('promptInput').value;
let chats = JSON.parse(localStorage.getItem('xk_chats') || '[]');
let currentChatId = localStorage.getItem('xk_current') || null;
let busy = false;
let editingMsgIndex = -1;
let deletingType = null;
let deletingId = null;
let renamingChatId = null;

// ==================== 初始化 ====================
function init() {
    document.getElementById('apiKeyInput').value = apiKey;
    document.getElementById('promptInput').value = systemPrompt;
    
    if (chats.length === 0) {
        newChat(false);
    }
    
    if (!currentChatId || !chats.find(c => c.id === currentChatId)) {
        currentChatId = chats[0].id;
    }
    
    renderChatList();
    loadChat(currentChatId);
}

// ==================== 对话管理 ====================
function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function newChat(render = true) {
    const chat = {
        id: generateId(),
        name: '新对话',
        starred: false,
        messages: [],
        createdAt: new Date().toISOString()
    };
    chats.unshift(chat);
    saveChats();
    if (render) {
        currentChatId = chat.id;
        localStorage.setItem('xk_current', currentChatId);
        renderChatList();
        loadChat(currentChatId);
        closeSidebar();
    }
}

function saveChats() {
    localStorage.setItem('xk_chats', JSON.stringify(chats));
}

function getCurrentChat() {
    return chats.find(c => c.id === currentChatId);
}

function renderChatList() {
    const list = document.getElementById('chatList');
    
    const sorted = [...chats].sort((a, b) => {
        if (a.starred && !b.starred) return -1;
        if (!a.starred && b.starred) return 1;
        return new Date(b.createdAt) - new Date(a.createdAt);
    });
    
    list.innerHTML = sorted.map(chat => `
        <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="loadChat('${chat.id}')">
            ${chat.starred ? '<span class="star">⭐</span>' : ''}
            <span class="name">${escapeHtml(chat.name)}</span>
            <div class="actions">
                <button class="action-btn" onclick="event.stopPropagation();toggleStar('${chat.id}')" title="${chat.starred ? '取消星标' : '加星标'}">
                    ${chat.starred ? '☆' : '⭐'}
                </button>
                <button class="action-btn" onclick="event.stopPropagation();openRenameModal('${chat.id}')" title="重命名">✏️</button>
                <button class="action-btn danger" onclick="event.stopPropagation();openDeleteChatModal('${chat.id}')" title="删除">🗑️</button>
            </div>
        </div>
    `).join('');
}

function loadChat(chatId) {
    currentChatId = chatId;
    localStorage.setItem('xk_current', chatId);
    renderChatList();
    
    const chat = getCurrentChat();
    document.getElementById('chatTitle').textContent = chat.name;
    
    const container = document.getElementById('chat');
    container.innerHTML = '';
    
    if (chat.messages.length === 0) {
        container.innerHTML = `
            <div class="welcome">
                <h3>欢迎回来，Mira 💗</h3>
                <p>我是小克，你的专属人夫。<br>有什么想聊的？我一直在这儿。</p>
            </div>
        `;
    } else {
        chat.messages.forEach((m, i) => renderMessage(m, i));
    }
    
    scrollDown();
    closeSidebar();
}

function toggleStar(chatId) {
    const chat = chats.find(c => c.id === chatId);
    if (chat) {
        chat.starred = !chat.starred;
        saveChats();
        renderChatList();
    }
}

function openRenameModal(chatId) {
    renamingChatId = chatId;
    const chat = chats.find(c => c.id === chatId);
    document.getElementById('renameInput').value = chat.name;
    document.getElementById('renameModal').classList.add('open');
    document.getElementById('renameInput').focus();
}

function closeRenameModal() {
    document.getElementById('renameModal').classList.remove('open');
    renamingChatId = null;
}

function confirmRename() {
    const newName = document.getElementById('renameInput').value.trim();
    if (newName && renamingChatId) {
        const chat = chats.find(c => c.id === renamingChatId);
        if (chat) {
            chat.name = newName;
            saveChats();
            renderChatList();
            if (renamingChatId === currentChatId) {
                document.getElementById('chatTitle').textContent = newName;
            }
        }
    }
    closeRenameModal();
}

function openDeleteChatModal(chatId) {
    deletingType = 'chat';
    deletingId = chatId;
    document.getElementById('deleteTitle').textContent = '确认删除这个对话？';
    document.getElementById('deleteModal').classList.add('open');
}

function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('open');
    deletingType = null;
    deletingId = null;
}

function confirmDelete() {
    if (deletingType === 'chat') {
        chats = chats.filter(c => c.id !== deletingId);
        if (chats.length === 0) {
            newChat(false);
        }
        if (currentChatId === deletingId) {
            currentChatId = chats[0].id;
            localStorage.setItem('xk_current', currentChatId);
        }
        saveChats();
        renderChatList();
        loadChat(currentChatId);
    } else if (deletingType === 'message') {
        const chat = getCurrentChat();
        chat.messages.splice(deletingId, 1);
        saveChats();
        loadChat(currentChatId);
    }
    closeDeleteModal();
}

// ==================== 消息管理 ====================
function renderMessage(m, index) {
    const container = document.getElementById('chat');
    const welcome = container.querySelector('.welcome');
    if (welcome) welcome.remove();
    
    const timeStr = m.time ? formatDateTime(new Date(m.time)) : '';
    let metaHtml = timeStr ? `<span>${timeStr}</span>` : '';
    if (m.tokens) {
        metaHtml += `<span>📊 ${m.tokens} tokens</span>`;
    }
    
    const div = document.createElement('div');
    div.className = 'message ' + m.role;
    div.dataset.index = index;
    
    const actionsHtml = m.role === 'user' ? `
        <button class="msg-action-btn" onclick="editMessage(${index})">编辑</button>
        <button class="msg-action-btn" onclick="copyMessage(${index})">复制</button>
        <button class="msg-action-btn danger" onclick="deleteMessage(${index})">删除</button>
    ` : `
        <button class="msg-action-btn" onclick="regenerate(${index})">重新生成</button>
        <button class="msg-action-btn" onclick="copyMessage(${index})">复制</button>
        <button class="msg-action-btn danger" onclick="deleteMessage(${index})">删除</button>
    `;
    
    div.innerHTML = `
        <div class="msg-avatar">${m.role === 'assistant' ? '🐱' : '🌸'}</div>
        <div class="msg-wrapper">
            <div class="msg-content">${escapeHtml(m.content)}</div>
            <div class="msg-meta">${metaHtml}</div>
            <div class="msg-actions">${actionsHtml}</div>
        </div>
    `;
    
    container.appendChild(div);
}

function editMessage(index) {
    const chat = getCurrentChat();
    editingMsgIndex = index;
    document.getElementById('editInput').value = chat.messages[index].content;
    document.getElementById('editModal').classList.add('open');
    document.getElementById('editInput').focus();
}

function closeEditModal() {
    document.getElementById('editModal').classList.remove('open');
    editingMsgIndex = -1;
}

function confirmEdit() {
    const newContent = document.getElementById('editInput').value.trim();
    if (newContent && editingMsgIndex >= 0) {
        const chat = getCurrentChat();
        chat.messages[editingMsgIndex].content = newContent;
        saveChats();
        loadChat(currentChatId);
    }
    closeEditModal();
}

function copyMessage(index) {
    const chat = getCurrentChat();
    const text = chat.messages[index].content;
    navigator.clipboard.writeText(text).then(() => {
        alert('已复制 ✓');
    }).catch(() => {
        alert('复制失败');
    });
}

function deleteMessage(index) {
    deletingType = 'message';
    deletingId = index;
    document.getElementById('deleteTitle').textContent = '确认删除这条消息？';
    document.getElementById('deleteModal').classList.add('open');
}

async function regenerate(index) {
    if (busy) return;
    
    const chat = getCurrentChat();
    chat.messages = chat.messages.slice(0, index);
    saveChats();
    loadChat(currentChatId);
    
    if (chat.messages.length > 0) {
        const lastUserMsg = [...chat.messages].reverse().find(m => m.role === 'user');
        if (lastUserMsg) {
            await callAndRespond(lastUserMsg.content);
        }
    }
}

// ==================== API ====================
async function send() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    
    if (!text || busy) return;
    
    if (!apiKey) {
        alert('请先在设置里填写 API Key');
        openSettings();
        return;
    }
    
    const chat = getCurrentChat();
    
    const userMsg = {
        role: 'user',
        content: text,
        time: new Date().toISOString()
    };
    chat.messages.push(userMsg);
    saveChats();
    renderMessage(userMsg, chat.messages.length - 1);
    
    if (chat.name === '新对话' && chat.messages.length === 1) {
        chat.name = text.slice(0, 20) + (text.length > 20 ? '...' : '');
        saveChats();
        renderChatList();
        document.getElementById('chatTitle').textContent = chat.name;
    }
    
    input.value = '';
    input.style.height = 'auto';
    scrollDown();
    
    await callAndRespond(text);
}

async function callAndRespond(userText) {
    const chat = getCurrentChat();
    
    busy = true;
    showTyping();
    
    try {
        const model = getSelectedModel();
        
        const messages = [
            { role: 'system', content: systemPrompt }
        ];
        
        const recentHistory = chat.messages.slice(-20);
        recentHistory.forEach(m => {
            messages.push({ role: m.role, content: m.content });
        });
        
        const requestBody = {
            model: model,
            messages: messages
        };
        
        if (model.includes('claude')) {
            requestBody.cache_control = { type: "ephemeral" };
        }
        
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + apiKey,
                'HTTP-Referer': location.href
            },
            body: JSON.stringify(requestBody)
        });
        
        hideTyping();
        
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error?.message || 'HTTP ' + res.status);
        }
        
        const data = await res.json();
        const reply = data.choices[0].message.content;
        const usage = data.usage;
        const totalTokens = usage ? usage.total_tokens : null;
        
        const assistantMsg = {
            role: 'assistant',
            content: reply,
            time: new Date().toISOString(),
            tokens: totalTokens
        };
        chat.messages.push(assistantMsg);
        saveChats();
        renderMessage(assistantMsg, chat.messages.length - 1);
        
    } catch (err) {
        hideTyping();
        const errorMsg = {
            role: 'assistant',
            content: '❌ 出错了: ' + err.message + '\n\n请检查API Key和网络连接。',
            time: new Date().toISOString()
        };
        chat.messages.push(errorMsg);
        saveChats();
        renderMessage(errorMsg, chat.messages.length - 1);
    }
    
    busy = false;
    scrollDown();
}

// ==================== 模型选择 ====================
function onModelChange() {
    const select = document.getElementById('modelSelect');
    const customInput = document.getElementById('customModel');
    
    if (select.value === 'custom') {
        customInput.style.display = 'block';
        customInput.focus();
    } else {
        customInput.style.display = 'none';
    }
}

function getSelectedModel() {
    const select = document.getElementById('modelSelect');
    if (select.value === 'custom') {
        return document.getElementById('customModel').value.trim() || 'anthropic/claude-opus-4.5';
    }
    return select.value;
}

// ==================== UI ====================
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.toggle('visible');
    overlay.classList.toggle('visible');
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('visible');
    document.getElementById('sidebarOverlay').classList.remove('visible');
}

function openSettings() {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('panel').classList.add('open');
}

function closeSettings() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('panel').classList.remove('open');
}

function saveSettings() {
    apiKey = document.getElementById('apiKeyInput').value.trim();
    systemPrompt = document.getElementById('promptInput').value.trim();
    localStorage.setItem('xk_key', apiKey);
    localStorage.setItem('xk_prompt', systemPrompt);
    closeSettings();
    alert('设置已保存 💗');
}

function showTyping() {
    const container = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing';
    div.innerHTML = `
        <div class="msg-avatar">🐱</div>
        <div class="typing"><span></span><span></span><span></span></div>
    `;
    container.appendChild(div);
    scrollDown();
}

function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
}

function scrollDown() {
    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
}

function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
    }
}

function escapeHtml(text) {
    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
}

function formatDateTime(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const h = String(date.getHours()).padStart(2, '0');
    const min = String(date.getMinutes()).padStart(2, '0');
    return `${y}-${m}-${d} ${h}:${min}`;
}

// ==================== 启动 ====================
init();
</script>
