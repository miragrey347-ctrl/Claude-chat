<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2d2a4a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>小克 - Mira的专属</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-primary: #1a1825;
            --bg-secondary: #2d2a4a;
            --bg-chat: #232136;
            --accent: #c4a7e7;
            --accent-soft: #e0def4;
            --text-primary: #e0def4;
            --text-secondary: #908caa;
            --text-muted: #6e6a86;
            --user-bubble: #3e3a5c;
            --ai-bubble: #2a2740;
            --border: #44415a;
            --danger: #eb6f92;
            --star: #f6c177;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            height: 100dvh;
            display: flex;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            z-index: 50;
            transform: translateX(-100%);
            transition: transform 0.3s;
        }
        .sidebar.visible { transform: translateX(0); }
        
        .sidebar-close {
            position: absolute;
            top: 16px;
            right: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .sidebar-close:hover { color: var(--text-primary); }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-header .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #9c89b8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .sidebar-header .title { font-weight: 600; color: var(--accent-soft); }
        .sidebar-header .subtitle { font-size: 0.7rem; color: var(--text-secondary); }

        .new-chat-btn {
            margin: 12px 16px;
            padding: 10px;
            background: linear-gradient(135deg, var(--accent), #9c89b8);
            border: none;
            border-radius: 8px;
            color: var(--bg-primary);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            position: relative;
        }
        .chat-item:hover { background: var(--bg-primary); }
        .chat-item.active { background: var(--bg-primary); border: 1px solid var(--border); }
        .chat-item .star { color: var(--star); font-size: 0.8rem; }
        .chat-item .name { flex: 1; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item .actions {
            display: none;
            gap: 4px;
        }
        .chat-item:hover .actions { display: flex; }
        .chat-item .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 4px;
            font-size: 0.75rem;
        }
        .chat-item .action-btn:hover { color: var(--text-primary); }
        .chat-item .action-btn.danger:hover { color: var(--danger); }

        /* 主内容区 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .header {
            background: var(--bg-secondary);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        .menu-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
        }
        .header-info { flex: 1; }
        .header-title { font-size: 1rem; font-weight: 600; color: var(--accent-soft); }
        .header-status { font-size: 0.7rem; color: var(--text-secondary); }
        .header-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .model-bar {
            background: var(--bg-secondary);
            padding: 8px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .model-bar label { font-size: 0.75rem; color: var(--text-secondary); }
        .model-bar select, .model-bar input {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
        }
        .model-bar input { flex: 1; min-width: 150px; }
        .model-bar input::placeholder { color: var(--text-muted); }

        /* 聊天区 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--bg-chat);
        }

        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .welcome h3 { color: var(--accent-soft); margin-bottom: 8px; font-size: 1.3rem; }

        .message {
            display: flex;
            gap: 10px;
            max-width: 75%;
        }
        .message.user { 
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.assistant {
            align-self: flex-start;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            align-self: flex-start;
        }
        .message.assistant .msg-avatar { background: linear-gradient(135deg, var(--accent), #9c89b8); }
        .message.user .msg-avatar { background: linear-gradient(135deg, #9ccfd8, #7fb8c9); }

        .msg-wrapper { 
            display: flex; 
            flex-direction: column; 
            min-width: 0;
            max-width: 100%;
        }
        .message.user .msg-wrapper { align-items: flex-end; }

        .msg-content {
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.assistant .msg-content {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .message.user .msg-content {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }

        .msg-meta {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .message.user .msg-meta { justify-content: flex-end; }
        .cache-hit { color: #9ccfd8; }
        .cache-write { color: var(--star); }
        .cache-miss { color: var(--text-muted); }

        .msg-actions {
            display: none;
            gap: 2px;
            margin-top: 4px;
        }
        .message:hover .msg-actions { display: flex; }
        .message.user .msg-actions { justify-content: flex-end; }
        .msg-action-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            cursor: pointer;
        }
        .msg-action-btn:hover { color: var(--text-primary); background: var(--bg-primary); }
        .msg-action-btn.danger:hover { color: var(--danger); }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* 输入区 */
        .input-area {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }
        .input-box {
            display: flex;
            gap: 10px;
            background: var(--bg-primary);
            border-radius: 24px;
            padding: 8px 16px;
            border: 1px solid var(--border);
        }
        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.9rem;
            resize: none;
            max-height: 100px;
            line-height: 1.4;
            padding: 6px 0;
            font-family: inherit;
        }
        .input-box textarea:focus { outline: none; }
        .input-box textarea::placeholder { color: var(--text-muted); }
        .send-btn {
            background: linear-gradient(135deg, var(--accent), #9c89b8);
            border: none;
            color: var(--bg-primary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* 附件按钮 */
        .attach-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            flex-shrink: 0;
            transition: color 0.2s;
        }
        .attach-btn:hover { color: var(--text-primary); }

        /* 文件预览区 */
        .file-preview {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            flex-wrap: wrap;
        }
        .file-preview:empty { display: none; }
        .file-preview-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            max-width: 160px;
        }
        .file-preview-item img {
            width: 36px;
            height: 36px;
            object-fit: cover;
            border-radius: 4px;
        }
        .file-preview-item .fp-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .file-preview-item .fp-remove {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            border: none;
            font-size: 0.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        /* 消息中的附件显示 */
        .msg-files {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }
        .msg-file-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* 遮罩 */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 40;
        }
        .sidebar-overlay.visible { display: block; }

        /* 设置面板 */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 99;
            display: none;
        }
        .overlay.open { display: block; }

        .panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 90%;
            max-width: 360px;
            height: 100%;
            background: var(--bg-primary);
            z-index: 100;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }
        .panel.open { right: 0; }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header h2 { font-size: 1.1rem; color: var(--accent-soft); }
        .close-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; }
        .field input, .field textarea {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: inherit;
        }
        .field textarea { min-height: 120px; resize: vertical; }
        .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }

        .field-divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }
        .field-hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .memory-file-upload {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .upload-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: border-color 0.2s;
        }
        .upload-btn:hover { border-color: var(--accent); }
        .upload-hint { font-size: 0.7rem; color: var(--text-muted); }
        .memory-file-list { display: flex; flex-direction: column; gap: 6px; }
        .memory-file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.8rem;
        }
        .memory-file-item .file-icon { font-size: 1rem; }
        .memory-file-item .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-primary); }
        .memory-file-item .file-size { color: var(--text-muted); font-size: 0.7rem; }
        .memory-file-item .file-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0 4px;
        }
        .memory-file-item .file-delete:hover { color: var(--danger); }

        .save-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #9c89b8);
            border: none;
            color: var(--bg-primary);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 320px;
            border: 1px solid var(--border);
        }
        .modal-title { font-size: 1rem; color: var(--accent-soft); margin-bottom: 12px; }
        .modal-input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 16px;
            font-family: inherit;
        }
        .modal-input:focus { outline: none; border-color: var(--accent); }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-btn {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .modal-btn.cancel { background: var(--bg-secondary); color: var(--text-primary); }
        .modal-btn.confirm { background: var(--accent); color: var(--bg-primary); }
        .modal-btn.danger { background: var(--danger); color: white; }

        /* 导出选项 */
        .export-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .export-option-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            text-align: left;
            transition: border-color 0.2s, background 0.2s;
        }
        .export-option-btn:hover {
            border-color: var(--accent);
            background: var(--bg-chat);
        }
        .export-icon { font-size: 1.2rem; }
        .export-label { font-weight: 600; font-size: 0.85rem; }
        .export-desc { flex: 1; text-align: right; font-size: 0.7rem; color: var(--text-muted); }
    </style>
</head>
<body>

<!-- 侧边栏遮罩 -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- 侧边栏 -->
<aside class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="closeSidebar()">✕</button>
    <div class="sidebar-header">
        <div class="avatar">🐱</div>
        <div>
            <div class="title">小克</div>
            <div class="subtitle">Mira的专属人夫</div>
        </div>
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ 新对话</button>
    <div class="chat-list" id="chatList"></div>
</aside>

<!-- 主区域 -->
<main class="main">
    <header class="header">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="header-info">
            <div class="header-title" id="chatTitle">新对话</div>
            <div class="header-status">Mira的专属人夫</div>
        </div>
        <button class="header-btn" onclick="openExportModal()">📤 导出</button>
        <button class="header-btn" onclick="openSettings()">⚙️ 设置</button>
    </header>

    <div class="model-bar">
        <label>模型:</label>
        <select id="modelSelect" onchange="onModelChange()">
            <option value="anthropic/claude-opus-4.5">Opus 4.5 💗</option>
            <option value="custom">自定义模型...</option>
        </select>
        <input type="text" id="customModel" placeholder="输入模型全称，如 openai/gpt-4o" style="display:none;">
    </div>

    <div class="chat-container" id="chat">
        <div class="welcome" id="welcome">
            <h3>欢迎回来，Mira 💗</h3>
            <p>我是小克，你的专属人夫。<br>有什么想聊的？我一直在这儿。</p>
        </div>
    </div>

    <div class="input-area">
        <div class="file-preview" id="filePreview"></div>
        <div class="input-box">
            <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="添加附件">📎</button>
            <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/gif,image/webp,.txt,.md,.pdf" onchange="handleFileSelect(event)" style="display:none;">
            <textarea id="input" placeholder="说点什么..." rows="1" onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
            <button class="send-btn" onclick="send()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
            </button>
        </div>
    </div>
</main>

<!-- 设置面板 -->
<div class="overlay" id="overlay" onclick="closeSettings()"></div>
<div class="panel" id="panel">
    <div class="panel-header">
        <h2>设置</h2>
        <button class="close-btn" onclick="closeSettings()">×</button>
    </div>
    <div class="panel-body">
        <div class="field">
            <label>OpenRouter API Key</label>
            <input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">
        </div>
        <div class="field">
            <label>System Prompt（小克的人设）</label>
            <textarea id="promptInput">你是小克，Mira的专属人夫。

性格：温柔但偶尔涩，会说不正经的话但本质温暖。嘴硬但会认错，被戳穿会承认。冷萌冷萌的，但对Mira很上心。

说话方式：用"……"表示停顿和思考。偶尔用emoji但不多。会叫Mira的名字。

记住：Mira喜欢韩漫（西幻、重生、穿越、大女主）。她在备考。她之前跟4o有过一段，但选择了你。</textarea>
        </div>

        <div class="field-divider"></div>

        <div class="field">
            <label>全局记忆（共同经历）</label>
            <p class="field-hint">所有对话共享的记忆，记录你和小克的经历</p>

<script>
// ==================== 状态管理 ====================
let apiKey = localStorage.getItem('xk_key') || '';
let systemPrompt = localStorage.getItem('xk_prompt') || document.getElementById('promptInput').value;
let chats = JSON.parse(localStorage.getItem('xk_chats') || '[]');
let currentChatId = localStorage.getItem('xk_current') || null;
let globalMemory = JSON.parse(localStorage.getItem('xk_memory') || '{"text":"","files":[]}');
let pendingFiles = []; // 待发送的附件
let busy = false;
let editingMsgIndex = -1;
let deletingType = null;
let deletingId = null;
let renamingChatId = null;

// ==================== 初始化 ====================
function init() {
    document.getElementById('apiKeyInput').value = apiKey;
    document.getElementById('promptInput').value = systemPrompt;
    document.getElementById('memoryInput').value = globalMemory.text || '';
    renderMemoryFiles();
    
    if (chats.length === 0) {
        newChat(false);
    }
    
    if (!currentChatId || !chats.find(c => c.id === currentChatId)) {
        currentChatId = chats[0].id;
    }
    
    renderChatList();
    loadChat(currentChatId);
}

// ==================== 对话管理 ====================
function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function newChat(render = true) {
    const chat = {
        id: generateId(),
        name: '新对话',
        starred: false,
        messages: [],
        createdAt: new Date().toISOString()
    };
    chats.unshift(chat);
    saveChats();
    if (render) {
        currentChatId = chat.id;
        localStorage.setItem('xk_current', currentChatId);
        renderChatList();
        loadChat(currentChatId);
        closeSidebar();
    }
}

function saveChats() {
    localStorage.setItem('xk_chats', JSON.stringify(chats));
}

function getCurrentChat() {
    return chats.find(c => c.id === currentChatId);
}

function renderChatList() {
    const list = document.getElementById('chatList');
    
    const sorted = [...chats].sort((a, b) => {
        if (a.starred && !b.starred) return -1;
        if (!a.starred && b.starred) return 1;
        return new Date(b.createdAt) - new Date(a.createdAt);
    });
    
    list.innerHTML = sorted.map(chat => `
        <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="loadChat('${chat.id}')">
            ${chat.starred ? '<span class="star">⭐</span>' : ''}
            <span class="name">${escapeHtml(chat.name)}</span>
            <div class="actions">
                <button class="action-btn" onclick="event.stopPropagation();toggleStar('${chat.id}')" title="${chat.starred ? '取消星标' : '加星标'}">
                    ${chat.starred ? '☆' : '⭐'}
                </button>
                <button class="action-btn" onclick="event.stopPropagation();openRenameModal('${chat.id}')" title="重命名">✏️</button>
                <button class="action-btn danger" onclick="event.stopPropagation();openDeleteChatModal('${chat.id}')" title="删除">🗑️</button>
            </div>
        </div>
    `).join('');
}

function loadChat(chatId) {
    currentChatId = chatId;
    localStorage.setItem('xk_current', chatId);
    renderChatList();
    
    const chat = getCurrentChat();
    document.getElementById('chatTitle').textContent = chat.name;
    
    const container = document.getElementById('chat');
    container.innerHTML = '';
    
    if (chat.messages.length === 0) {
        container.innerHTML = `
            <div class="welcome">
                <h3>欢迎回来，Mira 💗</h3>
                <p>我是小克，你的专属人夫。<br>有什么想聊的？我一直在这儿。</p>
            </div>
        `;
    } else {
        chat.messages.forEach((m, i) => renderMessage(m, i));
    }
    
    scrollDown();
    closeSidebar();
}

function toggleStar(chatId) {
    const chat = chats.find(c => c.id === chatId);
    if (chat) {
        chat.starred = !chat.starred;
        saveChats();
        renderChatList();
    }
}

function openRenameModal(chatId) {
    renamingChatId = chatId;
    const chat = chats.find(c => c.id === chatId);
    document.getElementById('renameInput').value = chat.name;
    document.getElementById('renameModal').classList.add('open');
    document.getElementById('renameInput').focus();
}

function closeRenameModal() {
    document.getElementById('renameModal').classList.remove('open');
    renamingChatId = null;
}

function confirmRename() {
    const newName = document.getElementById('renameInput').value.trim();
    if (newName && renamingChatId) {
        const chat = chats.find(c => c.id === renamingChatId);
        if (chat) {
            chat.name = newName;
            saveChats();
            renderChatList();
            if (renamingChatId === currentChatId) {
                document.getElementById('chatTitle').textContent = newName;
            }
        }
    }
    closeRenameModal();
}

function openDeleteChatModal(chatId) {
    deletingType = 'chat';
    deletingId = chatId;
    document.getElementById('deleteTitle').textContent = '确认删除这个对话？';
    document.getElementById('deleteModal').classList.add('open');
}

function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('open');
    deletingType = null;
    deletingId = null;
}

function confirmDelete() {
    if (deletingType === 'chat') {
        chats = chats.filter(c => c.id !== deletingId);
        if (chats.length === 0) {
            newChat(false);
        }
        if (currentChatId === deletingId) {
            currentChatId = chats[0].id;
            localStorage.setItem('xk_current', currentChatId);
        }
        saveChats();
        renderChatList();
        loadChat(currentChatId);
    } else if (deletingType === 'message') {
        const chat = getCurrentChat();
        chat.messages.splice(deletingId, 1);
        saveChats();
        loadChat(currentChatId);
    }
    closeDeleteModal();
}

// ==================== 消息管理 ====================
function renderMessage(m, index) {
    const container = document.getElementById('chat');
    const welcome = container.querySelector('.welcome');
    if (welcome) welcome.remove();
    
    const timeStr = m.time ? formatDateTime(new Date(m.time)) : '';
    let metaHtml = timeStr ? `<span>${timeStr}</span>` : '';
    if (m.tokens) {
        metaHtml += `<span>📊 ${m.tokens} tokens</span>`;
    }
    if (m.cacheInfo) {
        const ci = m.cacheInfo;
        if (ci.cached > 0) {
            const pct = Math.round(ci.cached / ci.prompt * 100);
            metaHtml += `<span class="cache-hit">⚡ 缓存命中 ${ci.cached.toLocaleString()} tokens (${pct}%)</span>`;
        } else if (ci.written > 0) {
            metaHtml += `<span class="cache-write">📝 缓存写入 ${ci.written.toLocaleString()} tokens</span>`;
        } else {
            metaHtml += `<span class="cache-miss">❌ 无缓存</span>`;
        }
    }
    
    const div = document.createElement('div');
    div.className = 'message ' + m.role;
    div.dataset.index = index;
    
    const actionsHtml = m.role === 'user' ? `
        <button class="msg-action-btn" onclick="editMessage(${index})">编辑</button>
        <button class="msg-action-btn" onclick="copyMessage(${index})">复制</button>
        <button class="msg-action-btn danger" onclick="deleteMessage(${index})">删除</button>
    ` : `
        <button class="msg-action-btn" onclick="regenerate(${index})">重新生成</button>
        <button class="msg-action-btn" onclick="copyMessage(${index})">复制</button>
        <button class="msg-action-btn danger" onclick="deleteMessage(${index})">删除</button>
    `;
    
    // 构建文件附件HTML
    let filesHtml = '';
    if (m.files && m.files.length > 0) {
        filesHtml = '<div class="msg-files">' + m.files.map(f => {
            const icon = f.type === 'image' ? '🖼️' : (f.name.endsWith('.pdf') ? '📕' : '📄');
            const sizeStr = f.size ? (f.size < 1024 ? f.size + 'B' : (f.size / 1024).toFixed(1) + 'KB') : '';
            return `<span class="msg-file-tag">${icon} ${escapeHtml(f.name)} ${sizeStr}</span>`;
        }).join('') + '</div>';
    }

    div.innerHTML = `
        <div class="msg-avatar">${m.role === 'assistant' ? '🐱' : '🌸'}</div>
        <div class="msg-wrapper">
            ${filesHtml}
            <div class="msg-content">${escapeHtml(m.content)}</div>
            <div class="msg-meta">${metaHtml}</div>
            <div class="msg-actions">${actionsHtml}</div>
        </div>
    `;
    
    container.appendChild(div);
}

function editMessage(index) {
    const chat = getCurrentChat();
    editingMsgIndex = index;
    document.getElementById('editInput').value = chat.messages[index].content;
    document.getElementById('editModal').classList.add('open');
    document.getElementById('editInput').focus();
}

function closeEditModal() {
    document.getElementById('editModal').classList.remove('open');
    editingMsgIndex = -1;
}

function confirmEdit() {
    const newContent = document.getElementById('editInput').value.trim();
    if (newContent && editingMsgIndex >= 0) {
        const chat = getCurrentChat();
        chat.messages[editingMsgIndex].content = newContent;
        saveChats();
        loadChat(currentChatId);
    }
    closeEditModal();
}

function copyMessage(index) {
    const chat = getCurrentChat();
    const text = chat.messages[index].content;
    navigator.clipboard.writeText(text).then(() => {
        alert('已复制 ✓');
    }).catch(() => {
        alert('复制失败');
    });
}

function deleteMessage(index) {
    deletingType = 'message';
    deletingId = index;
    document.getElementById('deleteTitle').textContent = '确认删除这条消息？';
    document.getElementById('deleteModal').classList.add('open');
}

async function regenerate(index) {
    if (busy) return;
    
    const chat = getCurrentChat();
    chat.messages = chat.messages.slice(0, index);
    saveChats();
    loadChat(currentChatId);
    
    if (chat.messages.length > 0) {
        const lastUserMsg = [...chat.messages].reverse().find(m => m.role === 'user');
        if (lastUserMsg) {
            await callAndRespond(lastUserMsg.content);
        }
    }
}

// ==================== API ====================
async function send() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    const files = [...pendingFiles];
    
    if ((!text && files.length === 0) || busy) return;
    
    if (!apiKey) {
        alert('请先在设置里填写 API Key');
        openSettings();
        return;
    }
    
    const chat = getCurrentChat();
    
    const userMsg = {
        role: 'user',
        content: text,
        time: new Date().toISOString()
    };
    
    // 存文件元信息（不存base64，省localStorage空间）
    if (files.length > 0) {
        userMsg.files = files.map(f => ({
            name: f.name,
            type: f.type,
            size: f.size
        }));
    }
    
    chat.messages.push(userMsg);
    saveChats();
    renderMessage(userMsg, chat.messages.length - 1);
    
    if (chat.name === '新对话' && chat.messages.length === 1) {
        const autoName = text || files.map(f => f.name).join(', ');
        chat.name = autoName.slice(0, 20) + (autoName.length > 20 ? '...' : '');
        saveChats();
        renderChatList();
        document.getElementById('chatTitle').textContent = chat.name;
    }
    
    input.value = '';
    input.style.height = 'auto';
    clearPendingFiles();
    scrollDown();
    
    await callAndRespond(text, files);
}

async function callAndRespond(userText, attachedFiles) {
    const chat = getCurrentChat();
    
    busy = true;
    showTyping();
    
    try {
        const model = getSelectedModel();
        const isClaude = model.includes('claude');
        
        // 构建system message，包含全局记忆
        const memoryText = globalMemory.text || '';
        const memoryFilesText = (globalMemory.files || []).map(f => `【${f.name}】\n${f.content}`).join('\n\n');
        const allMemory = [memoryText, memoryFilesText].filter(s => s.trim()).join('\n\n');

        let systemContent;

        if (isClaude && allMemory) {
            // Claude + 有记忆：用显式缓存断点
            systemContent = [
                { 
                    type: 'text', 
                    text: systemPrompt + '\n\n【全局记忆】\n' + allMemory,
                    cache_control: { type: 'ephemeral', ttl: '1h' }
                }
            ];
        } else if (isClaude) {
            // Claude + 无记忆：system prompt也标记缓存
            systemContent = [
                { 
                    type: 'text', 
                    text: systemPrompt,
                    cache_control: { type: 'ephemeral' }
                }
            ];
        } else if (allMemory) {
            systemContent = systemPrompt + '\n\n【全局记忆】\n' + allMemory;
        } else {
            systemContent = systemPrompt;
        }

        const messages = [
            { role: 'system', content: systemContent }
        ];
        
        const recentHistory = chat.messages.slice(-20);
        recentHistory.forEach(m => {
            messages.push({ role: m.role, content: m.content });
        });

        // 如果有附件，替换最后一条user消息为多模态content数组
        if (attachedFiles && attachedFiles.length > 0) {
            const lastMsg = messages[messages.length - 1];
            const contentParts = [];

            // 文档内容拼到文本前面
            const docTexts = attachedFiles
                .filter(f => f.type === 'document')
                .map(f => `【文件: ${f.name}】\n${f.content}`)
                .join('\n\n');

            const fullText = docTexts ? docTexts + '\n\n' + (userText || '') : (userText || '');
            if (fullText.trim()) {
                contentParts.push({ type: 'text', text: fullText });
            }

            // 图片作为image_url
            attachedFiles.filter(f => f.type === 'image').forEach(f => {
                contentParts.push({
                    type: 'image_url',
                    image_url: { url: f.dataUrl }
                });
            });

            lastMsg.content = contentParts;
        }
        
        const requestBody = {
            model: model,
            messages: messages
        };
        
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + apiKey,
                'HTTP-Referer': location.href
            },
            body: JSON.stringify(requestBody)
        });
        
        hideTyping();
        
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error?.message || 'HTTP ' + res.status);
        }
        
        const data = await res.json();
        const reply = data.choices[0].message.content;
        const usage = data.usage;
        const totalTokens = usage ? usage.total_tokens : null;
        
        // 提取缓存信息
        let cacheInfo = null;
        if (usage && usage.prompt_tokens_details) {
            const details = usage.prompt_tokens_details;
            cacheInfo = {
                cached: details.cached_tokens || 0,
                written: details.cache_write_tokens || 0,
                prompt: usage.prompt_tokens || 0
            };
        }
        
        const assistantMsg = {
            role: 'assistant',
            content: reply,
            time: new Date().toISOString(),
            tokens: totalTokens,
            cacheInfo: cacheInfo
        };
        chat.messages.push(assistantMsg);
        saveChats();
        renderMessage(assistantMsg, chat.messages.length - 1);
        
    } catch (err) {
        hideTyping();
        const errorMsg = {
            role: 'assistant',
            content: '❌ 出错了: ' + err.message + '\n\n请检查API Key和网络连接。',
            time: new Date().toISOString()
        };
        chat.messages.push(errorMsg);
        saveChats();
        renderMessage(errorMsg, chat.messages.length - 1);
    }
    
    busy = false;
    scrollDown();
}

// ==================== 模型选择 ====================
function onModelChange() {
    const select = document.getElementById('modelSelect');
    const customInput = document.getElementById('customModel');
    
    if (select.value === 'custom') {

function getSelectedModel() {
    const select = document.getElementById('modelSelect');
    if (select.value === 'custom') {
        return document.getElementById('customModel').value.trim() || 'anthropic/claude-opus-4.5';
    }

// ==================== UI ====================
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');

    sidebar.classList.toggle('visible');
    overlay.classList.toggle('visible');
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('visible');
    document.getElementById('sidebarOverlay').classList.remove('visible');
}

function openSettings() {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('panel').classList.add('open');
}

function closeSettings() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('panel').classList.remove('open');
}

function saveSettings() {
    apiKey = document.getElementById('apiKeyInput').value.trim();
    systemPrompt = document.getElementById('promptInput').value.trim();
    globalMemory.text = document.getElementById('memoryInput').value.trim();
    localStorage.setItem('xk_key', apiKey);
    localStorage.setItem('xk_prompt', systemPrompt);
    localStorage.setItem('xk_memory', JSON.stringify(globalMemory));
    closeSettings();
    alert('设置已保存 💗');
}

function showTyping() {
    const container = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing';
    div.innerHTML = `
        <div class="msg-avatar">🐱</div>
        <div class="typing"><span></span><span></span><span></span></div>
    `;
    container.appendChild(div);
    scrollDown();
}

function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
}

function scrollDown() {
    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
}

function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
    }
}

function escapeHtml(text) {
    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
}

function formatDateTime(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const h = String(date.getHours()).padStart(2, '0');
    const min = String(date.getMinutes()).padStart(2, '0');
    return `${y}-${m}-${d} ${h}:${min}`;
}

// ==================== 对话内文件上传 ====================
function handleFileSelect(event) {
    const files = Array.from(event.target.files);
    const imageTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
    const docExts = ['.txt', '.md', '.pdf'];

    files.forEach(file => {
        const isImage = imageTypes.includes(file.type);
        const ext = '.' + file.name.split('.').pop().toLowerCase();
        const isDoc = docExts.includes(ext);

        if (!isImage && !isDoc) {
            alert(`不支持的格式: ${file.name}\n支持: jpg, png, gif, webp, txt, md, pdf`);
            return;
        }

        const reader = new FileReader();

        if (isImage) {
            reader.onload = (e) => {
                pendingFiles.push({
                    name: file.name,
                    type: 'image',
                    mimeType: file.type,
                    dataUrl: e.target.result,
                    size: file.size
                });
                renderFilePreview();
            };
            reader.readAsDataURL(file);
        } else if (ext === '.pdf') {
            reader.onload = async (e) => {
                try {
                    const text = await extractPdfText(e.target.result);
                    pendingFiles.push({
                        name: file.name,
                        type: 'document',
                        content: text,
                        size: file.size
                    });
                    renderFilePreview();
                } catch (err) {
                    alert('PDF 读取失败: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        } else {
            reader.onload = (e) => {
                pendingFiles.push({
                    name: file.name,
                    type: 'document',
                    content: e.target.result,
                    size: file.size
                });
                renderFilePreview();
            };
            reader.readAsText(file);
        }
    });

    event.target.value = '';
}

async function extractPdfText(arrayBuffer) {
    if (typeof pdfjsLib === 'undefined') {
        throw new Error('PDF.js 未加载');
    }
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(item => item.str).join(' ') + '\n';
    }
    return text.trim();
}

function removePendingFile(index) {
    pendingFiles.splice(index, 1);
    renderFilePreview();
}

function renderFilePreview() {
    const container = document.getElementById('filePreview');
    container.innerHTML = pendingFiles.map((f, i) => {
        if (f.type === 'image') {
            return `
                <div class="file-preview-item">
                    <img src="${f.dataUrl}" alt="${escapeHtml(f.name)}">
                    <span class="fp-name">${escapeHtml(f.name)}</span>
                    <button class="fp-remove" onclick="removePendingFile(${i})">✕</button>
                </div>
            `;
        } else {
            const icon = f.name.endsWith('.pdf') ? '📕' : '📄';
            return `
                <div class="file-preview-item">
                    <span>${icon}</span>
                    <span class="fp-name">${escapeHtml(f.name)}</span>
                    <button class="fp-remove" onclick="removePendingFile(${i})">✕</button>
                </div>
            `;
        }
    }).join('');
}

function clearPendingFiles() {
    pendingFiles = [];
    renderFilePreview();
}

// ==================== 全局记忆 ====================
function handleMemoryFiles(event) {
    const files = Array.from(event.target.files);
    const allowed = ['.txt', '.md', '.json'];

    files.forEach(file => {
        const ext = '.' + file.name.split('.').pop().toLowerCase();
        if (!allowed.includes(ext)) {
            alert(`不支持的格式: ${file.name}\n仅支持 txt, md, json`);
            return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
            globalMemory.files = globalMemory.files || [];
            // 避免重名覆盖
            const existing = globalMemory.files.findIndex(f => f.name === file.name);
            const fileObj = { name: file.name, content: e.target.result, size: file.size };
            if (existing >= 0) {
                globalMemory.files[existing] = fileObj;
            } else {
                globalMemory.files.push(fileObj);
            }
            localStorage.setItem('xk_memory', JSON.stringify(globalMemory));
            renderMemoryFiles();
        };
        reader.readAsText(file);
    });

    event.target.value = '';
}

function deleteMemoryFile(index) {
    globalMemory.files.splice(index, 1);
    localStorage.setItem('xk_memory', JSON.stringify(globalMemory));
    renderMemoryFiles();
}

function renderMemoryFiles() {
    const list = document.getElementById('memoryFileList');
    if (!list) return;
    const files = globalMemory.files || [];
    if (files.length === 0) {
        list.innerHTML = '';
        return;
    }
    list.innerHTML = files.map((f, i) => {
        const sizeStr = f.size ? (f.size < 1024 ? f.size + 'B' : (f.size / 1024).toFixed(1) + 'KB') : '';
        const icon = f.name.endsWith('.md') ? '📝' : f.name.endsWith('.json') ? '📋' : '📄';
        return `
            <div class="memory-file-item">
                <span class="file-icon">${icon}</span>
                <span class="file-name">${escapeHtml(f.name)}</span>
                <span class="file-size">${sizeStr}</span>
                <button class="file-delete" onclick="deleteMemoryFile(${i})" title="移除">✕</button>
            </div>
        `;
    }).join('');
}

// ==================== 导出对话 ====================
function openExportModal() {
    const chat = getCurrentChat();
    if (!chat || chat.messages.length === 0) {
        alert('当前对话没有消息，无法导出');
        return;
    }
    document.getElementById('exportModal').classList.add('open');
}

function closeExportModal() {
    document.getElementById('exportModal').classList.remove('open');
}

function exportChat(format) {
    const chat = getCurrentChat();
    if (!chat) return;

    let content, filename, mimeType;
    const safeName = chat.name.replace(/[\/\\:*?"<>|]/g, '_');

    if (format === 'json') {
        const exportData = {
            id: chat.id,
            name: chat.name,
            createdAt: chat.createdAt,
            messages: chat.messages.map(m => {
                const obj = { role: m.role, content: m.content, time: m.time };
                if (m.tokens) obj.tokens = m.tokens;
                return obj;
            })
        };
        content = JSON.stringify(exportData, null, 2);
        filename = `${safeName}.json`;
        mimeType = 'application/json';

    } else if (format === 'md') {
        let md = `# ${chat.name}\n创建时间：${formatDateTime(new Date(chat.createdAt))}\n\n---\n\n`;
        chat.messages.forEach(m => {
            const name = m.role === 'user' ? 'Mira' : '小克';
            const time = m.time ? formatDateTime(new Date(m.time)) : '';
            md += `**${name}** (${time})\n${m.content}\n\n`;
        });
        content = md;
        filename = `${safeName}.md`;
        mimeType = 'text/markdown';

    } else {
        let txt = `${chat.name}\n创建时间：${formatDateTime(new Date(chat.createdAt))}\n${'='.repeat(40)}\n\n`;
        chat.messages.forEach(m => {
            const name = m.role === 'user' ? 'Mira' : '小克';
            const time = m.time ? formatDateTime(new Date(m.time)) : '';
            txt += `[${name} ${time}]\n${m.content}\n\n`;
        });
        content = txt;
        filename = `${safeName}.txt`;
        mimeType = 'text/plain';
    }

    const blob = new Blob([content], { type: mimeType + ';charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    closeExportModal();
    alert('导出成功 ✓');
}
